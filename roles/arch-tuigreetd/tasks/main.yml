- name: Set tuigreet in greetd config
  become: true
  shell: |
    cat << EOF > /etc/greetd/config.toml
    [terminal]
    vt = 1

    [default_session]
    command = "tuigreet -t --theme 'border=blue;container=black;text=cyan;time=red;prompt=green;input=red;action=blue;button=yellow;greet=cyan' --cmd /home/thadigus/dotfiles/scripts/arch_start_dwl.sh"
    user = "greeter"
    EOF

- name: Ensure /etc/greetd Permissions
  become: true
  file:
    path: /etc/greetd
    owner: greeter
    group: greeter
    mode: '0740'
    recurse: yes
