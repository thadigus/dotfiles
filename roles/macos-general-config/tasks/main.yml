- name: macOS - Ensure Homebrew is installed
  shell: |
    set -euo pipefail
    command -v brew >/dev/null 2>&1 || NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  args:
    executable: /bin/bash

- name: macOS - Install packages from Brewfile
  shell: brew bundle --file "{{ dotfiles_dir }}/scripts/Brewfile"
  args:
    executable: /bin/bash

- name: macOS - Remove Brew packages not in the Brewfile
  shell: brew bundle cleanup --force --file "{{ dotfiles_dir }}/scripts/Brewfile"
  args:
    executable: /bin/bash
  failed_when: false

- name: macOS - Install/upgrade mlx-lm (uv tool)
  shell: uv tool install --upgrade mlx-lm
  args:
    executable: /bin/bash
  environment:
    PATH: "/opt/homebrew/bin:{{ user_home }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"

- name: macOS - Apply dotfiles via stow
  shell: |
    set -euo pipefail
    cd "{{ dotfiles_dir }}"
    stow --adopt ghostty tmux fastfetch zsh
    git restore .
  args:
    executable: /bin/bash

- name: macOS - Ensure LaunchAgents directory exists
  file:
    path: "{{ user_home }}/Library/LaunchAgents"
    state: directory

- name: macOS - Install dotfiles-update LaunchAgent
  template:
    src: dotfiles-update.plist.j2
    dest: "{{ user_home }}/Library/LaunchAgents/com.thadigus.dotfiles-update.plist"

- name: macOS - Load dotfiles-update LaunchAgent
  shell: |
    launchctl bootout "gui/$(id -u)/com.thadigus.dotfiles-update" 2>/dev/null || true
    launchctl bootstrap "gui/$(id -u)" "{{ user_home }}/Library/LaunchAgents/com.thadigus.dotfiles-update.plist"
  args:
    executable: /bin/bash

- name: macOS - Install mlx-server LaunchAgent
  template:
    src: mlx-server.plist.j2
    dest: "{{ user_home }}/Library/LaunchAgents/com.thadigus.mlx-server.plist"

- name: macOS - Install mlx-bridge LaunchAgent
  template:
    src: mlx-bridge.plist.j2
    dest: "{{ user_home }}/Library/LaunchAgents/com.thadigus.mlx-bridge.plist"

- name: macOS - Load mlx-server and mlx-bridge LaunchAgents
  shell: |
    for a in com.thadigus.mlx-server com.thadigus.mlx-bridge; do
      launchctl bootout "gui/$(id -u)/$a" 2>/dev/null || true
      launchctl bootstrap "gui/$(id -u)" "{{ user_home }}/Library/LaunchAgents/$a.plist"
    done
  args:
    executable: /bin/bash