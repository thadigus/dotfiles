- name: Arch - Ensure base-devel and git are present
  become: true
  package:
    name:
      - base-devel
      - git
    state: present

- name: Arch - Build and install yay-bin when missing
  become: false
  shell: |
    set -euo pipefail
    [[ -x /usr/bin/yay ]] && exit 0
    build_dir="$HOME/.cache/yay-bin"
    rm -rf "$build_dir"
    mkdir -p "$build_dir"
    git clone https://aur.archlinux.org/yay-bin.git "$build_dir"
    cd "$build_dir"
    makepkg --syncdeps --install --noconfirm --needed
  args:
    executable: /bin/bash

- name: Arch - Read package list
  slurp:
    src: "{{ dotfiles_dir }}/scripts/arch_packages.list"
  register: arch_packages_file

- name: Arch - Install packages via yay
  become: false
  pacman:
    name: "{{ (arch_packages_file.content | b64decode).splitlines() | map('trim') | reject('match', '^$') | reject('match', '^#')}}"
    state: present
    executable: yay
    extra_args: --builddir /var/cache/yay

- name: Artix - Ensure cronie is enabled
  become: true
  runit:
    name: cronie
    state: started
    enabled: true

- name: Arch - Ensure update-on-reboot cron exists
  cron:
    name: Update Dotfiles on Reboot
    special_time: reboot
    job: "{{ dotfiles_dir }}/scripts/arch_logon.sh"

- name: Set Shell to Zsh
  become: true
  user:
    name: thadigus
    shell: /bin/zsh

- name: "Clone latest DWL to {{ ansible_facts['env']['HOME'] }}"
  git:
    repo: https://codeberg.org/dwl/dwl.git
    dest: "{{ user_home }}/.dwl"
    update: true

- name: Arch - Apply dotfiles via stow
  shell: "{{ dotfiles_dir }}/scripts/arch_dotfiles.sh"
  args:
    executable: /bin/bash

- name: Build DWL
  become: true
  shell: |
    cd "{{ user_home }}/.dwl"
    make clean install
