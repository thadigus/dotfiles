# Ansible Pull Playbook for Deploying My Workstations
#
# First run (fresh install): ansible-pull -K -U https://git.turnerservices.cloud/thadigus/dotfiles ansible_pull.yml
# Subsequent runs:           ansible-pull -U https://git.turnerservices.cloud/thadigus/dotfiles ansible_pull.yml

---

- hosts: localhost
  connection: local
  vars:
    user_home: "{{ ansible_facts['env']['HOME'] }}"
    dotfiles_dir: "{{ user_home }}/dotfiles"
  tasks:
    - name: Clone dotfiles repo to home
      git:
        repo: https://git.turnerservices.cloud/thadigus/dotfiles.git
        dest: "{{ dotfiles_dir }}"
        update: true
    # ── Arch Linux ──────────────────────────────────────────────
    - name: arch-dotfiles-dwl Role
      include_role:
        name: arch-dotfiles-dwl
      when: ansible_facts['distribution'] in ["Archlinux", "Artix Linux"]
    - name: arch-tuigreetd Role
      include_role:
        name: arch-tuigreetd
      when: ansible_facts['distribution'] in ["Archlinux", "Artix Linux"]
    # ── macOS ───────────────────────────────────────────────────
    - name: macOS General Config Role
      include_role:
        name: macos-general-config
      when: ansible_facts['os_family'] == "Darwin"
