---
- name: Read Arch bootstrap package list from dotfiles repo
  slurp:
    src: "{{ dotfiles_dir }}/scripts/arch_bootstrap_packages.list"
  register: arch_bootstrap_packages_file

- name: Build bootstrap package list from file
  set_fact:
    arch_bootstrap_package_list: >-
      {{
        (arch_bootstrap_packages_file.content | b64decode).splitlines()
        | map('trim')
        | reject('match', '^$')
        | reject('match', '^#')
        | list
      }}

- name: Ensure bootstrap packages are present
  become: true
  package:
    name: "{{ arch_bootstrap_package_list }}"
    state: present

- name: Read Arch package list from dotfiles repo
  slurp:
    src: "{{ dotfiles_dir }}/scripts/arch_packages.list"
  register: arch_packages_file

- name: Build package list from file
  set_fact:
    arch_package_list: >-
      {{
        (arch_packages_file.content | b64decode).splitlines()
        | map('trim')
        | reject('match', '^$')
        | reject('match', '^#')
        | list
      }}

- name: Temporarily allow passwordless sudo for wheel during yay install
  become: true
  copy:
    dest: /etc/sudoers.d/99-ansible-yay
    content: "%wheel ALL=(ALL:ALL) NOPASSWD: ALL\n"
    mode: "0440"

- name: Bootstrap yay-bin when missing
  shell: |
    set -euo pipefail
    if [[ -x /usr/bin/yay ]]; then
      exit 0
    fi
    build_dir="$HOME/.cache/yay-bin"
    rm -rf "$build_dir"
    mkdir -p "$(dirname "$build_dir")"
    git clone https://aur.archlinux.org/yay-bin.git "$build_dir"
    cd "$build_dir"
    makepkg -si --noconfirm --needed
  args:
    executable: /bin/bash

- name: Install Arch packages from list via yay
  become: false
  shell: |
    set -euo pipefail
    pkg_list="{{ arch_package_list | join(' ') }}"
    [[ -n "$pkg_list" ]] || exit 0
    /usr/bin/yay -S --noconfirm --needed $pkg_list
  args:
    executable: /bin/bash

- name: Remove temporary passwordless sudo override
  become: true
  file:
    path: /etc/sudoers.d/99-ansible-yay
    state: absent
