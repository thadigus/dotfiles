---
- name: Ensure Homebrew is installed
  shell: |
    set -euo pipefail
    command -v brew >/dev/null 2>&1 || /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  args:
    executable: /bin/bash

- name: Ensure Brewfile exists in scripts directory
  stat:
    path: "{{ dotfiles_dir }}/scripts/Brewfile"
  register: brewfile_stat

- name: Assert Brewfile exists
  assert:
    that:
      - brewfile_stat.stat.exists
    fail_msg: "Expected Brewfile at {{ dotfiles_dir }}/scripts/Brewfile"

- name: Apply packages from Brewfile
  shell: brew bundle --file "{{ dotfiles_dir }}/scripts/Brewfile"
  args:
    executable: /bin/bash
