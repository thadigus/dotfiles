---
- name: Check whether Homebrew is installed
  command: brew --version
  register: brew_present
  ignore_errors: true
  changed_when: false

- name: Install Homebrew when missing
  shell: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  when: brew_present is failed

- name: Ensure Brewfile exists in scripts directory
  stat:
    path: "{{ dotfiles_dir }}/scripts/Brewfile"
  register: brewfile_stat

- name: Fail when Brewfile is missing
  fail:
    msg: "Expected Brewfile at {{ dotfiles_dir }}/scripts/Brewfile"
  when: not brewfile_stat.stat.exists

- name: Apply packages from Brewfile
  shell: brew bundle --file "{{ dotfiles_dir }}/scripts/Brewfile"
  args:
    executable: /bin/bash
